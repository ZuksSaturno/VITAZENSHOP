<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VitaZen — Produtos Naturais</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c4a86a;
  --gold-soft:#d7c29a;
  --green:#6f8b6d;
  --green-dark:#526552;
  --bg:#f8f5ef;
  --white:#ffffff;
  --text:#4b4b4b;
  --muted:#8d8d8d;
  --border:#ebe3d5;
  --shadow:0 10px 30px rgba(0,0,0,.06);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */

nav{
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(12px);
  background:rgba(248,245,239,.92);
  border-bottom:1px solid var(--border);
  padding:16px 24px;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo h1{
  font-family:'Playfair Display',serif;
  font-size:24px;
  color:var(--gold);
  font-weight:600;
}

.cart-btn{
  border:none;
  background:var(--green);
  color:white;
  padding:12px 18px;
  border-radius:100px;
  cursor:pointer;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
  transition:.25s;
}

.cart-btn:hover{
  background:var(--green-dark);
}

.cart-count{
  background:white;
  color:var(--green);
  width:22px;
  height:22px;
  border-radius:50%;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* HERO */

.hero{
  padding:80px 24px 60px;
  text-align:center;
  position:relative;
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at top left, rgba(196,168,106,.12), transparent 40%),
  radial-gradient(circle at bottom right, rgba(111,139,109,.15), transparent 40%);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(34px,6vw,58px);
  line-height:1.1;
  color:var(--gold);
  margin-bottom:16px;
}

.hero p{
  max-width:650px;
  margin:auto;
  font-size:16px;
  line-height:1.8;
  color:var(--muted);
}

.hero-btn{
  margin-top:32px;
  border:none;
  background:var(--gold);
  color:white;
  padding:16px 34px;
  border-radius:100px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

.hero-btn:hover{
  transform:translateY(-2px);
  background:var(--green);
}

/* SECTION */

.section{
  max-width:1200px;
  margin:auto;
  padding:40px 24px 80px;
}

.section-title{
  text-align:center;
  margin-bottom:40px;
}

.section-title span{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--green);
  font-weight:700;
}

.section-title h3{
  margin-top:10px;
  font-family:'Playfair Display',serif;
  font-size:42px;
  color:var(--gold);
}

/* FILTER */

.filters{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.filter{
  border:1px solid var(--border);
  background:white;
  padding:10px 20px;
  border-radius:100px;
  cursor:pointer;
  transition:.25s;
  font-size:13px;
  font-weight:600;
}

.filter:hover{
  border-color:var(--gold);
  color:var(--gold);
}

.filter.active{
  background:var(--gold);
  color:white;
  border-color:var(--gold);
}

/* PRODUCTS */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:24px;
}

.card{
  background:white;
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  transition:.25s;
}

.card:hover{
  transform:translateY(-6px);
}

.visual{
  height:240px;
  position:relative;
  overflow:hidden;
}

.capsulas{background:linear-gradient(135deg,#f3eee2,#e4d8bd);}
.cha{background:linear-gradient(135deg,#edf5ea,#dce7d9);}
.shake{background:linear-gradient(135deg,#f7f1e4,#f1dec0);}
.outros{background:linear-gradient(135deg,#f3f0e9,#ddd6c6);}

.product-image{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.4s;
}

.card:hover .product-image{
  transform:scale(1.05);
}

.badge{
  position:absolute;
  top:14px;
  left:14px;
  background:var(--green);
  color:white;
  padding:5px 10px;
  border-radius:100px;
  font-size:10px;
  font-weight:700;
  z-index:2;
}

.card-body{
  padding:20px;
}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:18px;
  color:var(--gold);
  margin-bottom:10px;
}

.card-desc{
  font-size:13px;
  line-height:1.7;
  color:var(--muted);
  margin-bottom:18px;
}

.card-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.price{
  font-size:24px;
  font-family:'Playfair Display',serif;
  color:var(--green-dark);
  font-weight:600;
}

.add-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:var(--green);
  color:white;
  cursor:pointer;
  font-size:20px;
  transition:.25s;
}

.add-btn:hover{
  transform:scale(1.08);
  background:var(--gold);
}

/* CART */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  z-index:200;
  display:none;
}

.overlay.open{
  display:block;
}

.cart{
  position:fixed;
  top:0;
  right:0;
  height:100%;
  width:min(430px,100%);
  background:white;
  z-index:201;
  transform:translateX(100%);
  transition:.35s;
  display:flex;
  flex-direction:column;
}

.cart.open{
  transform:translateX(0);
}

.cart-header{
  padding:24px;
  border-bottom:1px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.cart-header h4{
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:var(--gold);
}

.close-btn{
  border:none;
  background:none;
  font-size:22px;
  cursor:pointer;
}

.cart-items{
  flex:1;
  overflow-y:auto;
  padding:20px 24px;
}

.empty{
  text-align:center;
  color:var(--muted);
  margin-top:100px;
}

.item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px 0;
  border-bottom:1px solid var(--border);
}

.item-icon{
  width:55px;
  height:55px;
  border-radius:16px;
  overflow:hidden;
  background:var(--bg);
}

.cart-image{
  width:100%;
  height:100%;
  object-fit:cover;
}

.item-info{
  flex:1;
}

.item-name{
  font-size:14px;
  font-weight:600;
  margin-bottom:4px;
}

.item-price{
  font-size:13px;
  color:var(--green);
}

.qty{
  display:flex;
  align-items:center;
  gap:8px;
}

.qty button{
  width:28px;
  height:28px;
  border-radius:50%;
  border:none;
  background:var(--bg);
  cursor:pointer;
}

.cart-footer{
  padding:24px;
  border-top:1px solid var(--border);
  background:#faf8f2;
}

.total{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.total span:first-child{
  color:var(--muted);
}

.total span:last-child{
  font-size:28px;
  font-family:'Playfair Display',serif;
  color:var(--gold);
}

.checkout{
  width:100%;
  border:none;
  background:#25D366;
  color:white;
  padding:16px;
  border-radius:100px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
}

.checkout:hover{
  transform:translateY(-2px);
}

@media(max-width:600px){

.hero{
  padding-top:60px;
}

.hero h2{
  font-size:42px;
}

.section-title h3{
  font-size:32px;
}

}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <h1>VitaZen</h1>
  </div>

  <button class="cart-btn" onclick="openCart()">
    🛒 Carrinho
    <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<section class="hero">
  <div class="hero-content">

    <h2>Bem-vindo à VitaZen</h2>

    <p>
      Produtos naturais selecionados para auxiliar na sua rotina,
      bem-estar na forma mais leve e equilibrada.
    </p>

    <button class="hero-btn" onclick="document.getElementById('produtos').scrollIntoView({behavior:'smooth'})">
      Ver produtos
    </button>

  </div>
</section>

<section class="section" id="produtos">

  <div class="section-title">
    <span>Nossa linha</span>
    <h3>Produtos VitaZen</h3>
  </div>

  <div class="filters">
    <button class="filter active" onclick="filterProducts('todos',this)">Todos</button>
    <button class="filter" onclick="filterProducts('capsulas',this)">Cápsulas</button>
    <button class="filter" onclick="filterProducts('cha',this)">Chás</button>
    <button class="filter" onclick="filterProducts('shake',this)">Shakes</button>
    <button class="filter" onclick="filterProducts('outros',this)">Outros</button>
  </div>

  <div class="products" id="productsGrid"></div>

</section>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart" id="cart">

  <div class="cart-header">
    <h4>Seu carrinho</h4>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>

  <div class="cart-items" id="cartItems"></div>

  <div class="cart-footer" id="cartFooter" style="display:none">

    <div class="total">
      <span>Total</span>
      <span id="cartTotal">R$ 0,00</span>
    </div>

    <button class="checkout" onclick="sendWhatsApp()">
      Finalizar no WhatsApp
    </button>

  </div>

</div>

<script>

const whatsappNumber = '5537991282536';

const products = [

{
id:1,
name:'Greenful Detox Caps',
price:120,
image:'cps emagrece.jpg',
cat:'capsulas',
badge:'Mais vendido',
desc:'Cápsulas naturais para emagrecimento.'
},

{
id:2,
name:'Greenfull Chá Premium',
price:100,
image:'chá pote.png',
cat:'cha',
badge:'Destaque',
desc:'Chá natural com ingredientes selecionados.'
},

{
id:3,
name:'Greenfull Chá Slim',
price:70,
image:'chá caixa2.png',
cat:'cha',
badge:null,
desc:'Ajuda no desinchaço e bem-estar.'
},
/*
{
id:4,
name:'SmartFit Cinta',
price:209,
image:'images/cinta.jpg',
cat:'outros',
badge:'Premium',
desc:'Cinta modeladora ergonômica.'
},*/

{
id:5,
name:'GreenCollagen Beauty+',
price:150,
image:'colageno.png',
cat:'outros',
badge:'Beauty',
desc:'Colágeno para pele, cabelo e unhas.'
},
/*
{
id:6,
name:'GreenVitta Multivit',
price:90,
image:'images/multivit.jpg',
cat:'capsulas',
badge:null,
desc:'Vitaminas para o dia a dia.'
},
*/
{
id:7,
name:'GreenSleep Melatonina',
price:80,
image:'dormir.png',
cat:'capsulas',
badge:null,
desc:'Melhora a qualidade do sono.'
},

{
id:8,
name:'Shake Açaí & Banana',
price:90,
image:'shk bnana com açai.jpg',
cat:'shake',
badge:null,
desc:'Shake natural nutritivo.'
},

{
id:9,
name:'Shake Baunilha',
price:90,
image:'shk bãnilha.jpg',
cat:'shake',
badge:null,
desc:'Shake cremoso e saudável.'
},

{
id:10,
name:'Shake Choco Belga',
price:90,
image:'shk choco belga.jpg',
cat:'shake',
badge:null,
desc:'Chocolate intenso e nutritivo.'
},

{
id:11,
name:'Shake Morango Fresh',
price:90,
image:'shk muiango.jpg',
cat:'shake',
badge:null,
desc:'Shake refrescante sabor morango.'
},

];

const visualClass = {
capsulas:'capsulas',
cha:'cha',
shake:'shake',
outros:'outros'
};

let cart = {};

function renderProducts(filter='todos'){

const grid = document.getElementById('productsGrid');

const list = filter === 'todos'
? products
: products.filter(p => p.cat === filter);

grid.innerHTML = list.map(p => `

<div class="card">

<div class="visual ${visualClass[p.cat]}">

${p.badge ? `<div class="badge">${p.badge}</div>` : ''}

<img src="${p.image}" alt="${p.name}" class="product-image">

</div>

<div class="card-body">

<div class="card-title">${p.name}</div>

<div class="card-desc">${p.desc}</div>

<div class="card-footer">

<div class="price">
R$ ${p.price.toFixed(2).replace('.',',')}
</div>

<button class="add-btn" onclick="addToCart(${p.id})">
+
</button>

</div>

</div>

</div>

`).join('');

}

function filterProducts(cat,el){

document.querySelectorAll('.filter').forEach(btn=>{
btn.classList.remove('active');
});

el.classList.add('active');

renderProducts(cat);

}

function addToCart(id){

cart[id] = (cart[id] || 0) + 1;

updateCart();

}

function changeQty(id,delta){

cart[id] = (cart[id] || 0) + delta;

if(cart[id] <= 0){
delete cart[id];
}

updateCart();

}

function updateCart(){

const count = Object.values(cart).reduce((s,v)=>s+v,0);

document.getElementById('cartCount').textContent = count;

const entries = Object.entries(cart);

const cartItems = document.getElementById('cartItems');

if(!entries.length){

cartItems.innerHTML = `
<div class="empty">
🛒<br><br>
Seu carrinho está vazio
</div>
`;

document.getElementById('cartFooter').style.display='none';

return;

}

document.getElementById('cartFooter').style.display='block';

let total = 0;

cartItems.innerHTML = entries.map(([id,qty])=>{

const p = products.find(x=>x.id == id);

total += p.price * qty;

return `

<div class="item">

<div class="item-icon">
<img src="${p.image}" alt="${p.name}" class="cart-image">
</div>

<div class="item-info">

<div class="item-name">
${p.name}
</div>

<div class="item-price">
R$ ${(p.price * qty).toFixed(2).replace('.',',')}
</div>

</div>

<div class="qty">

<button onclick="changeQty(${id},-1)">−</button>

<span>${qty}</span>

<button onclick="changeQty(${id},1)">+</button>

</div>

</div>

`;

}).join('');

document.getElementById('cartTotal').textContent =
'R$ ' + total.toFixed(2).replace('.',',');

}

function openCart(){

document.getElementById('overlay').classList.add('open');
document.getElementById('cart').classList.add('open');

}

function closeCart(){

document.getElementById('overlay').classList.remove('open');
document.getElementById('cart').classList.remove('open');

}

function sendWhatsApp(){

const entries = Object.entries(cart);

if(!entries.length) return;

let total = 0;

let message = 'Olá, gostaria de pedir:%0A%0A';

entries.forEach(([id,qty])=>{

const p = products.find(x=>x.id == id);

const subtotal = p.price * qty;

total += subtotal;

message += `• ${p.name} x${qty} - R$ ${subtotal.toFixed(2).replace('.',',')}%0A`;

});

message += `%0A💰 Total: R$ ${total.toFixed(2).replace('.',',')}`;

window.open(
`https://wa.me/${whatsappNumber}?text=${message}`,
'_blank'
);

}

renderProducts();
updateCart();

</script>

</body>
</html>
